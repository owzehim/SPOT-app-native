<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />

    <!-- viewport: iOS PWA + 화면 비율 고정 -->
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />

    <!-- PWA 기본 색상 / manifest -->
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS가 홈 화면 앱으로 인식하도록 하는 메타들 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="UvA-IN" />

    <!-- iOS 홈화면 아이콘 (새 프로젝트 경로 기준) -->
    <link rel="apple-touch-icon" href="/assets/icon.png" />

    <title>UvA-IN 멤버십</title>
  </head>
  <body>
    <noscript>이 앱을 사용하려면 JavaScript가 필요합니다.</noscript>
    <div id="root"></div>
    <!-- Expo가 여기에 번들 스크립트를 자동으로 주입함 -->
  </body>
</html>
